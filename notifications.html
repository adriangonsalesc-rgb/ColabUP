<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones — ColabUp</title>
<meta name="theme-color" content="#1E3A5F">
<link rel="icon" href="assets/images/logo.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/notifications.css">
<link rel="stylesheet" href="css/chatbot.css">
</head>
<body>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-shell">
  <aside class="app-sidebar" id="sidebar">
    <a href="index.html" class="brand"><img src="assets/images/logo.png" alt="ColabUp"></a>
    <nav class="app-nav">
      <a href="dashboard.html"><i class="fa-solid fa-grip"></i> Dashboard</a>
      <a href="profile.html"><i class="fa-solid fa-user"></i> Mi perfil</a>
      <a href="projects.html"><i class="fa-solid fa-diagram-project"></i> Proyectos</a>
      <a href="groups.html"><i class="fa-solid fa-users-rectangle"></i> Grupos</a>
      <a href="messages.html"><i class="fa-solid fa-message"></i> Mensajes</a>
      <a href="notifications.html" class="is-active"><i class="fa-solid fa-bell"></i> Notificaciones</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Configuración</a>
      <a href="help.html"><i class="fa-solid fa-circle-question"></i> Ayuda</a>
    </nav>
    <div class="app-sidebar-footer">
      <button id="logout-btn" style="width:100%; background:none; border:none; cursor:pointer; padding:0;">
        <span style="display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:8px; font-size:14px; font-weight:600; font-family: var(--font-display); color: rgba(255,255,255,0.7);">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar sesión
        </span>
      </button>
    </div>
  </aside>

  <div class="app-main">
    <header class="app-topbar">
      <button class="icon-btn nav-toggle-mobile" id="sidebar-toggle" aria-label="Abrir menú"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-search">
        <i class="fa-solid fa-magnifying-glass" style="color:#8b93a1;"></i>
        <input type="search" placeholder="Buscar proyectos, personas, grupos...">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" aria-label="Notificaciones"><i class="fa-solid fa-bell"></i><span class="dot"></span></button>
        <button class="icon-btn" aria-label="Mensajes"><i class="fa-solid fa-message"></i></button>
        <div class="user-chip">
          <span class="avatar" id="user-avatar-topbar">U</span>
          <span id="user-name-topbar">Usuario</span>
        </div>
      </div>
    </header>

    <main class="app-content">
      <section class="page-head">
        <div><h1>Notificaciones</h1><p>Todo lo que ha pasado en tu comunidad ColabUp.</p></div>
        <button class="btn btn-secondary" id="mark-all-read-btn"><i class="fa-solid fa-check-double"></i> Marcar todo como leído</button>
      </section>

      <div class="tabs-row">
        <button class="tab-btn is-active" data-notif-tab="all">Todas</button>
        <button class="tab-btn" data-notif-tab="unread">No leídas <span class="count" id="unread-count">0</span></button>
      </div>

      <div class="panel" style="padding: 8px var(--space-2);">
        <div class="notif-list" id="notif-list"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast" role="status" aria-live="polite"></div>

<script src="js/auth.js"></script>
<script>
  ColabAuth.requireAuth('login.html');
  const session = ColabAuth.getSession();
  if (session) {
    const displayName = session.name || session.email;
    document.getElementById('user-name-topbar').textContent = displayName;
    document.getElementById('user-avatar-topbar').textContent = displayName.slice(0, 2).toUpperCase();
  }
  document.getElementById('logout-btn').addEventListener('click', () => {
    ColabAuth.logout();
    window.location.href = 'index.html';
  });
</script>
<script src="js/dashboard.js"></script>
<script src="js/notifications.js"></script>
<script src="js/chatbot.js"></script>
</body>
</html>
